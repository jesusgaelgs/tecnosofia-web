<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnosofia - Subdominio Cyberpunk</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://raw.githack.com/gwannon/Cyberpunk-2077-theme-css/main/cyberpunk-2077.css">
    
    <style>
        /* Ajustamos la estructura base para que luzca como el HUD del juego */
        body {
            background-color: #FCEE0A; /* Amarillo clásico de Cyberpunk 2077 */
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #000;
        }
        .container {
            background-color: #020202;
            padding: 2.5rem;
            width: 90%;
            max-width: 500px;
            position: relative;
            border: 1px solid #00E6F6; /* Borde Cyan */
            box-shadow: 10px 10px 0px #FF003C; /* Sombra roja neón */
        }
        /* Etiqueta superior del sistema */
        .container::before {
            content: "SYS.TECNOSOFIA.XYZ //";
            position: absolute;
            top: -1.5rem;
            left: 0;
            color: #00E6F6;
            font-size: 0.9rem;
            background-color: #020202;
            padding: 2px 10px;
            border-top: 1px solid #00E6F6;
            border-left: 1px solid #00E6F6;
            border-right: 1px solid #00E6F6;
        }
        h1 {
            color: #FF003C; 
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        p {
            color: #00E6F6; 
            font-size: 0.9rem;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #FCEE0A;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            background-color: rgba(255, 0, 60, 0.1);
            border: 1px solid #FF003C;
            color: #FCEE0A;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            background-color: #FF003C;
            color: #000;
        }
        /* Ajuste para el botón oficial de Gwannon */
        button.cyberpunk2077 {
            width: 100%;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
        }
        #resultado { 
            margin-top: 1.5rem; 
            font-weight: bold; 
            font-size: 1rem; 
            text-transform: uppercase;
            line-height: 1.5;
        }
    </style>
</head>
<body class="cyberpunk">

<div class="container">
    <h1 class="cyberpunk glitched" title="TECNOSOFIA">TECNOSOFIA</h1>
    <p>>_ ENLACE DE RED ESTABLECIDO. OBTÉN TU ACCESO.</p>
    
    <form id="dnsForm">
        <div class="form-group">
            <label for="subdomain">1. ID DE USUARIO (SUBDOMINIO):</label>
            <input type="text" id="subdomain" placeholder="ejemplo: netrunner" required>
        </div>
        <div class="form-group">
            <label for="target">2. NODO DESTINO (ENLACE VERCEL):</label>
            <input type="text" id="target" placeholder="ejemplo: mi-proyecto.vercel.app" required>
        </div>
        <button class="cyberpunk2077" type="submit">INICIAR CONEXIÓN_</button>
    </form>

    <div id="resultado"></div>
</div>

<script>
    // El mismo motor seguro de siempre, pero con mensajes de "hackeo"
    document.getElementById('dnsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const resultadoDiv = document.getElementById('resultado');
        resultadoDiv.style.color = '#FCEE0A';
        resultadoDiv.innerText = '>_ HACKEANDO MAINFRAME DE CLOUDFLARE... ⏳';

        const subdomain = document.getElementById('subdomain').value.trim().toLowerCase();
        let target = document.getElementById('target').value.trim().toLowerCase();
        
        target = target.replace(/^(https?:\/\/)?(www\.)?/, '');

        try {
            const response = await fetch('/api/create-dns', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subdomain, target })
            });

            const data = await response.json();

            if (data.success) {
                resultadoDiv.style.color = '#00E6F6';
                resultadoDiv.innerHTML = `>_ ACCESO CONCEDIDO. 🎉<br>>_ NODO <strong>${subdomain}.tecnosofia.xyz</strong> EN LÍNEA.<br>>_ CONECTA TU TERMINAL EN VERCEL.`;
            } else {
                resultadoDiv.style.color = '#FF003C';
                resultadoDiv.innerText = `>_ ERROR DEL SISTEMA: ${data.error || 'CONEXIÓN RECHAZADA.'}`;
            }
        } catch (err) {
            resultadoDiv.style.color = '#FF003C';
            resultadoDiv.innerText = '>_ ERROR FATAL: SERVIDOR NO ENCONTRADO.';
        }
    });
</script>

</body>
</html>
